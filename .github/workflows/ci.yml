# Finyx CI — tests and build checks only.
#
# Does NOT deploy. Vercel and Render keep using their existing GitHub
# integrations (auto-deploy on push). This workflow runs in parallel as a
# quality gate. To block broken code from reaching main, enable branch
# protection: require the "CI" check to pass before merging.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit & integration tests
        run: npm test
        env:
          FINYX_TEST_MODE: "1"
          NODE_ENV: test

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Placeholder Vite env vars — CI does not call your live API or Firebase.
      - name: Build (Vercel smoke check)
        run: npm run build
        env:
          VITE_API_URL: https://ci-placeholder.example.com
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
          VITE_FIREBASE_APP_ID: 1:123456789012:web:ci000000000000000000

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [test-api, build-frontend]
    if: always()
    steps:
      - name: Require all jobs to pass
        run: |
          if [ "${{ needs.test-api.result }}" != "success" ] || [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
